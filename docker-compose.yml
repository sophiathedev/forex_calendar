services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: forexbot-flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "8191:8191"
    restart: unless-stopped

  bot:
    build: .
    container_name: forexbot
    env_file: .env
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - flaresolverr
    restart: unless-stopped
